name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: ${{ github.repository_owner == 'morinokami' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.6.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install the latest npm
        run: vp install -g npm@latest

      - name: Build packages
        run: vp run --filter './packages/*' build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          # changesets/action splits the version string on whitespace and passes
          # each token as a literal argument via @actions/exec (no shell), so
          # shell operators like "&&" cannot be used inline. We use a script instead.
          version: scripts/version.sh
          publish: vpx changeset publish
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync example versions after publish
        if: steps.changesets.outputs.published == 'true'
        run: |
          node scripts/update-example-versions.ts
          # Wait for the npm registry to propagate the newly published versions.
          # Retry up to 5 times with increasing backoff (10s, 20s, 30s, …).
          for i in 1 2 3 4 5; do
            sleep $((i * 10))
            if vp install --no-frozen-lockfile; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Failed to install after 5 retries"
              exit 1
            fi
            echo "Retry $i/5: registry not ready yet..."
          done

      - name: Commit updated examples
        if: steps.changesets.outputs.published == 'true'
        run: |
          git add examples/ pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "chore: sync example versions"
          git push
