name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: ${{ github.repository_owner == 'morinokami' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install the latest npm
        run: vp install -g npm@latest

      - name: Build packages
        run: vp run build -r

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          # "changeset version" also updates examples/ via updateInternalDependencies,
          # but that causes a lockfile mismatch because the new version isn't published yet.
          # Example versions are updated at the right time by update-example-versions.ts
          # after "changeset publish", so we revert the premature changes here.
          version: vpx changeset version && git checkout examples/
          publish: vpx changeset publish
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync example versions after publish
        if: steps.changesets.outputs.published == 'true'
        run: |
          node scripts/update-example-versions.ts
          # Wait for the npm registry to propagate the newly published versions.
          sleep 10
          vp install --no-frozen-lockfile

      - name: Commit updated examples
        if: steps.changesets.outputs.published == 'true'
        run: |
          git add examples/ pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "chore: sync example versions"
          git push
